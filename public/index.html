<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<script src="https://kit.fontawesome.com/5f59ca6ad3.js"></script>
</head>

<body>
<div class="todos-bg-container">
<div class="container">
<div class="row">
<div class="col-12">

<h1 class="todos-heading">Todos</h1>

<h1 class="create-task-heading">
Create <span class="create-task-heading-subpart">Task</span>
</h1>

<input type="text" id="todoUserInput" class="todo-user-input" />
<button id="addTodoButton" class="add-todo-button">Add</button>

<h1 class="todo-items-heading">
My <span class="todo-items-heading-subpart">Tasks</span>
</h1>

<ul id="todoItemsContainer"></ul>

<button id="saveTodoButton" class="add-todo-button">Save</button>

</div>
</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
